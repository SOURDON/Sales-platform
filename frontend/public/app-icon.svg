<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06140f" />
      <stop offset="55%" stop-color="#0b221a" />
      <stop offset="100%" stop-color="#0e2a20" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8f7444" />
      <stop offset="50%" stop-color="#7b6339" />
      <stop offset="100%" stop-color="#9b7f4d" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)" />

  <!-- Subtle emerald texture strokes -->
  <path d="M48 138C144 84 236 84 326 130" fill="none" stroke="#184333" stroke-opacity=".22" stroke-width="14" />
  <path d="M96 404C184 360 294 360 420 420" fill="none" stroke="#153b2e" stroke-opacity=".22" stroke-width="12" />

  <!-- Fountain-pen style camera line art -->
  <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path d="M145 198h66l20-30h50l20 30h66c18 0 32 14 32 32v118c0 18-14 32-32 32H145c-18 0-32-14-32-32V230c0-18 14-32 32-32z"
      stroke-width="12" />
    <circle cx="256" cy="289" r="66" stroke-width="11" />
    <circle cx="256" cy="289" r="31" stroke-width="6" opacity=".9" />
    <path d="M333 232h38" stroke-width="8" opacity=".85" />
    <path d="M194 171h124" stroke-width="6" opacity=".6" />
  </g>
</svg>
